content_rules:
  language: es
  tone:
    - clear
    - institutional
    - student-centered
    - useful
    - direct
    - not overly corporate
    - not overly casual
  traceability:
    - EXISTENTE
    - INFERIDO
    - PROPUESTA DE MEJORA
  placeholder_policy:
    use_placeholders_when_missing: true
    placeholder_style: useful and clearly marked
    image_placeholder: use mockup/images/passport-placeholder.svg or an obvious typed placeholder block
    text_placeholder: use concise neutral copy in Spanish
  do_not_invent:
    - do not invent pages without grounding
    - do not invent unsupported images
    - do not invent backend flows

page_framework:
  layers:
    - institucional
    - servicios
    - representacion_estudiantil
    - participacion
    - transparencia
    - noticias_eventos
    - recursos_practicos
  required_states:
    - desktop
    - tablet
    - mobile
  accessibility:
    - contrast
    - visible focus states
    - keyboard friendly navigation
    - descriptive labels
    - readable hierarchy
    - accessible forms

copy_seed:
  home_hero: '¡ATRÉVETE A VIVIR LA U MÁS ALLÁ DE LAS AULAS!'
  feuna_intro: 'La FEUNA es el gobierno estudiantil de la UNA, una organización independiente y autónoma que representa al estudiantado.'
  deuna_title: 'Directorio Estudiantil (DEUNA)'
  deuna_period: 'Representantes estudiantiles de la FEUNA 2025-2027'
  deuna_intro: 'El Directorio Estudiantil (DEUNA) es el órgano ejecutivo de la FEUNA, encargado de representar a la comunidad estudiantil en los espacios de toma de decisiones de la universidad.'
  participation_label: 'Participación'
  contact_note: 'Mantener contacto visible, pero subordinado a la lógica de participación y servicio.'

known_interactions:
  - mobile hamburger menu
  - automatic hero slideshow
  - news filter tags
  - deuna commission filters
  - smooth scrolling
  - image fallback with initials or placeholder
  - dynamic highlight panel for selected filter

figma_guidance:
  - build reusable components from the shared header/footer and key cards
  - keep the FEUNA red and UNA blue as anchors
  - preserve the current structural work instead of replacing it with a generic corporate design
  - use placeholders only where the source content is incomplete
  - standardize all colors, spacing, typography, and component states in one library
  - keep image paths and asset names explicit when referenced
